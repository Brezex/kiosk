version: '3.8'

services:
  zabbix-kiosk:
    build: .
    container_name: zabbix-kiosk
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Persist database
      - kiosk-data:/app/data
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production-very-secret-key-min-32-chars}
      - DATABASE_URL=sqlite:///./data/zabbix_kiosk.db
      - PORT=8000
      - CORS_ORIGINS=http://localhost,http://localhost:8000,http://your-domain.com
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  kiosk-data:
    driver: local