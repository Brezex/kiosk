services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zabbix-kiosk-backend
    restart: unless-stopped
    # ВАЖНО: Команда должна быть здесь (на уровне с build и ports)
    # Мы используем "/app/backend" как рабочую папку (из Dockerfile), 
    # поэтому скрипт create_admin.py должен физически лежать в папке backend
    command: >
      sh -c "python create_admin.py && python -m uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    volumes:
      - kiosk-data:/app/data
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production-very-secret-key-min-32-chars}
      - DATABASE_URL=sqlite:///./data/zabbix_kiosk.db
      - PORT=8000
      - CORS_ORIGINS=http://localhost,http://localhost:8000,http://localhost:5173
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    container_name: zabbix-kiosk-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy

volumes:
  kiosk-data:
    driver: local