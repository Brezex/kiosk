version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zabbix-kiosk-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - kiosk-data:/app/data
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production-very-secret-key-min-32-chars}
      - DATABASE_URL=sqlite:///./data/zabbix_kiosk.db
      - PORT=8000
      - CORS_ORIGINS=http://localhost,http://localhost:8000,http://localhost:5173
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    container_name: zabbix-kiosk-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Монтируем фронтенд
      - ./frontend/dist:/usr/share/nginx/html:ro
      # Монтируем конфиг nginx
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  kiosk-data:
    driver: local