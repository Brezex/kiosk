version: '3.8'

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: zabbix-kiosk-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=sqlite:///./data/zabbix_kiosk.db
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - CORS_ORIGINS=http://localhost,http://localhost:8000,http://localhost:5173,http://${DOMAIN:-localhost}
      - ZABBIX_RETRY_COUNT=3
    volumes:
      - backend-data:/app/data
    networks:
      - kiosk-network
    # Запуск create_admin.py перед стартом приложения
    command: >
      sh -c "python create_admin.py && python -m uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: zabbix-kiosk-frontend
    restart: unless-stopped
    networks:
      - kiosk-network

  nginx:
    image: nginx:alpine
    container_name: zabbix-kiosk-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Копируем статику из образа frontend
      - frontend-dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
      - frontend
    networks:
      - kiosk-network

volumes:
  backend-data:
  frontend-dist:

networks:
  kiosk-network:
    driver: bridge